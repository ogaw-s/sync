<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 16px;
    }
    #members {
      display: flex;
      gap: 12px;
    }
    .member {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #333;
    }
    .member.ready { background: #4f4; }
    .member.me { box-shadow: 0 0 0 2px #fff; }
    #countdown {
      font-size: 80px;
      font-weight: bold;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #status {
      font-size: 14px;
      color: #666;
    }
    .selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .selector button {
      padding: 8px 16px;
      font-size: 14px;
      background: #333;
      color: #fff;
    }
    .selector button.selected {
      background: #4f4;
      color: #000;
    }
    .buttons { display: flex; gap: 12px; }
    button {
      padding: 16px 32px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #readyBtn { background: #333; color: #fff; }
    #readyBtn.ready { background: #4f4; color: #000; }
    #startBtn { background: #f44; color: #fff; }
    #stopBtn { background: #666; color: #fff; display: none; }
    #stopBtn.active { display: block; }
    #tapBtn {
      display: none;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #f44;
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 0.5s infinite;
      user-select: none;
      -webkit-user-select: none;
    }
    #tapBtn.active { display: flex; align-items: center; justify-content: center; }
    #tapBtn.holding {
      background: #4f4;
      color: #000;
      animation: none;
      transform: translate(-50%, -50%) scale(0.95);
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.1); }
    }
    label { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div id="members"></div>
  <div id="countdown"></div>
  <div id="status">--</div>

  <label>曲</label>
  <div class="selector" id="songSelector">
    <button data-song="suisou" class="selected">水槽のクジラ</button>
    <button data-song="yumo">勇猛無比</button>
    <button data-song="loveshine">LOVE SHINE</button>
  </div>

  <label>タイプ</label>
  <div class="selector" id="typeSelector">
    <button data-type="sync" class="selected">同期</button>
    <button data-type="click">クリック</button>
  </div>

  <div class="buttons">
    <button id="readyBtn" disabled>Ready</button>
    <button id="startBtn" disabled>Start</button>
    <button id="stopBtn">Stop</button>
  </div>
  <button id="tapBtn">HOLD</button>
  <script src="client.js"></script>
</body>
</html>
